<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Chat • TeenVerse</title><link rel="stylesheet" href="css/style.css"></head>
<body class="chat-body"><div class="chat-app">
<aside class="sidebar" id="sidebar"><div class="sidebar-head"><div class="mini-logo">🌊</div><div><strong>TeenVerse</strong><small>Live community</small></div><button id="closeSidebar" class="icon mobile-only">✕</button></div><nav id="rooms" class="rooms"><button class="room active" data-room="General"># General</button><button class="room" data-room="Gaming"># Gaming</button><button class="room" data-room="Music"># Music</button><button class="room" data-room="Study"># Study</button><button class="room" data-room="Memes"># Memes</button></nav><div class="sidebar-section"><div class="section-title"><span>Direct messages</span><span id="dmCount">0</span></div><div id="dmList" class="dm-list"><p class="empty">No conversations yet.</p></div></div><div class="me-card"><div id="meAvatar" class="avatar">?</div><div class="me-info"><strong id="meName">Loading…</strong><small id="meRole">USER</small></div><button id="profileBtn" class="icon" title="Edit profile">⚙️</button><button id="logoutBtn" class="icon" title="Log out">↪</button></div></aside>
<main class="chat-main"><header class="chat-header"><button id="menuBtn" class="icon mobile-only">☰</button><div><h2 id="chatTitle"># General</h2><p id="chatSubtitle">Room messages are saved for 24 hours.</p></div><button id="staffBtn" class="staff-button hidden">Staff</button></header><div id="announcement" class="announcement hidden"></div><section id="messages" class="messages"></section><div id="typing" class="typing"></div><form id="messageForm" class="composer"><button type="button" id="emojiBtn" class="icon">😊</button><input id="messageInput" maxlength="500" autocomplete="off" placeholder="Message #General"><button class="send" type="submit">Send</button><div id="emojiPanel" class="emoji-panel hidden"></div></form></main>
<aside class="people"><div class="people-title">Online — <span id="onlineCount">0</span></div><div id="onlineUsers" class="online-users"></div></aside>
</div>
<div id="profileModal" class="modal hidden"><div class="modal-card"><button class="modal-close" data-close="profileModal">✕</button><h3>Edit profile</h3><form id="profileForm"><label class="avatar-upload"><div id="profilePreview" class="avatar large">?</div><input id="avatarInput" type="file" accept="image/png,image/jpeg,image/webp"></label><label>Bio<textarea id="bio" maxlength="250"></textarea></label><div class="two"><label>Mood<input id="mood" maxlength="80"></label><label>Relationship<input id="relationship" maxlength="40"></label></div><label>Country<input id="profileCountry" maxlength="60"></label><button class="primary" type="submit">Save profile</button><p id="profileStatus" class="status"></p></form></div></div>
<div id="userModal" class="modal hidden"><div class="modal-card"><button class="modal-close" data-close="userModal">✕</button><div id="userProfile"></div><button id="startDmBtn" class="primary">Message</button></div></div>
<div id="staffModal" class="modal hidden"><div class="modal-card wide"><button class="modal-close" data-close="staffModal">✕</button><h3>Staff panel</h3><form id="announcementForm" class="inline-form"><input id="announcementInput" maxlength="250" placeholder="Announcement"><button class="primary">Send</button></form><div class="staff-grid"><label>Username<input id="staffUsername"></label><label>Role<select id="staffRole"><option>USER</option><option>VIP</option><option>SUPER_VIP</option><option>MODERATOR</option><option>ADMIN</option><option>SUPER_ADMIN</option><option>CO_OWNER</option></select></label></div><div class="action-row"><button data-action="role">Set role</button><button data-action="mute">Mute</button><button data-action="unmute">Unmute</button><button data-action="kick">Kick</button><button data-action="ban" class="danger">Ban</button><button data-action="unban">Unban</button></div><p id="staffStatus" class="status"></p></div></div>
<script src="/socket.io/socket.io.js"></script><script src="js/chat.js"></script></body></html>

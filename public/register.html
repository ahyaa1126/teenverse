<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Register • TeenVerse</title><link rel="stylesheet" href="css/style.css"></head>
<body class="auth-body"><div class="ambient"></div><main class="auth-shell"><section class="brand-panel"><div class="logo">🌊</div><h1>Join TeenVerse</h1><p>Create your account and meet people in shared rooms.</p><div class="safety-note">Ages 13–20 only. Never share private details, passwords, or addresses.</div></section><section class="auth-card"><h2>Create account</h2><form id="registerForm"><div class="two"><label>Username<input id="username" required minlength="3" maxlength="30"></label><label>Age<input id="age" type="number" min="13" max="20" required></label></div><label>Password<input id="password" type="password" minlength="6" required></label><div class="two"><label>Gender<select id="gender"><option>Prefer not to say</option><option>Female</option><option>Male</option><option>Non-binary</option><option>Other</option></select></label><label>Country<input id="country" maxlength="60" placeholder="India"></label></div><button class="primary" type="submit">Create account</button><p id="status" class="status"></p></form><p class="switch">Already registered? <a href="login.html">Log in</a></p></section></main><script src="js/register.js"></script></body></html>

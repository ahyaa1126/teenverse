<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Login • TeenVerse</title><link rel="stylesheet" href="css/style.css"></head>
<body class="auth-body"><div class="ambient"></div><main class="auth-shell"><section class="brand-panel"><div class="logo">🌊</div><h1>TeenVerse</h1><p>A safer social chat space for teens.</p><div class="feature-pills"><span>Live rooms</span><span>Private DMs</span><span>Profiles</span></div></section><section class="auth-card"><h2>Welcome back</h2><p class="muted">Log in to continue chatting.</p><form id="loginForm"><label>Username<input id="username" autocomplete="username" required maxlength="30"></label><label>Password<input id="password" type="password" autocomplete="current-password" required minlength="6"></label><button class="primary" type="submit">Enter TeenVerse</button><p id="status" class="status"></p></form><p class="switch">New here? <a href="register.html">Create an account</a></p></section></main><script src="js/login.js"></script></body></html>
